<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта сокровищ 🗺️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffd1ff 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: auto;
        }

        
        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .falling-emoji {
            position: absolute;
            font-size: 30px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.1s ease;
            z-index: 2;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            animation: fall linear forwards;
        }

        .falling-emoji:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.8));
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0.6;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #c44569;
            font-size: 42px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #c44569;
            margin-bottom: 50px;
            font-size: 16px;
            opacity: 0.7;
        }

        
        .map-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 50px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        
        .vertical-map {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        
        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        
        .step-circle {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #c44569;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 2;
        }

        .step-circle:hover:not(.locked) {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            background: white;
        }

        .step-circle.locked {
            background: rgba(200, 200, 200, 0.8);
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .step-circle.completed {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            box-shadow: 0 0 15px rgba(196, 69, 105, 0.5);
        }

        
        .lock-overlay {
            position: absolute;
            bottom: -5px;
            right: -5px;
            font-size: 18px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        
        .step-name {
            margin-top: 10px;
            font-size: 14px;
            color: #c44569;
            font-weight: 500;
            text-align: center;
            max-width: 100px;
        }

        
        .dotted-line {
            width: 2px;
            height: 40px;
            background: repeating-linear-gradient(
                to bottom,
                rgba(196, 69, 105, 0.5) 0px,
                rgba(196, 69, 105, 0.5) 8px,
                transparent 8px,
                transparent 16px
            );
            margin: 5px 0;
        }

        .dotted-line.active {
            background: repeating-linear-gradient(
                to bottom,
                rgba(196, 69, 105, 0.8) 0px,
                rgba(196, 69, 105, 0.8) 8px,
                transparent 8px,
                transparent 16px
            );
        }

        
        .horizontal-map {
            display: none;
        }

        
        .actions-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #fff 0%, #fef5f0 100%);
            border-radius: 25px;
            padding: 20px;
            width: 320px;
            max-width: 90%;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: modalZoom 0.3s ease-out;
            border: 2px solid #ffd1ff;
        }

        @keyframes modalZoom {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .actions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd1ff;
        }

        .actions-title {
            font-size: 18px;
            color: #c44569;
            font-weight: bold;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: #c44569;
            transition: all 0.3s;
            line-height: 1;
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            transform: scale(1.2);
            background: rgba(196, 69, 105, 0.1);
        }

        .actions-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .action-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #555;
            animation: slideIn 0.3s ease-out;
            animation-fill-mode: both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .action-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #c44569;
        }

        .action-text {
            flex: 1;
        }

        .action-text.completed {
            text-decoration: line-through;
            color: #ccc;
        }

        .actions-list::-webkit-scrollbar {
            width: 4px;
        }

        .actions-list::-webkit-scrollbar-track {
            background: #ffd1ff;
            border-radius: 3px;
        }

        .actions-list::-webkit-scrollbar-thumb {
            background: #c44569;
            border-radius: 3px;
        }

        
        .final-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #fff 0%, #fef5f0 100%);
            border-radius: 25px;
            padding: 25px;
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: modalZoom 0.3s ease-out;
            border: 2px solid #ffd1ff;
            text-align: center;
        }

        .final-modal .close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        
        .back-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #c44569;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .back-button:hover {
            transform: scale(1.05);
            background: white;
        }

        
        .progress-section {
            margin-top: 40px;
            text-align: center;
        }

        .progress-label {
            color: #c44569;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .progress-fill {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
            border-radius: 10px;
        }

        
        .message-popup {
            position: fixed;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 10000;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
            animation: popupIn 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes popupIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        
        @media (min-width: 768px) {
            .vertical-map {
                display: none;
            }
            
            .horizontal-map {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-wrap: wrap;
                gap: 0;
            }
            
            .step-item-horizontal {
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
            }
            
            .dotted-line-horizontal {
                width: 60px;
                height: 2px;
                background: repeating-linear-gradient(
                    to right,
                    rgba(196, 69, 105, 0.5) 0px,
                    rgba(196, 69, 105, 0.5) 8px,
                    transparent 8px,
                    transparent 16px
                );
                margin-top: 35px;
            }
            
            .dotted-line-horizontal.active {
                background: repeating-linear-gradient(
                    to right,
                    rgba(196, 69, 105, 0.8) 0px,
                    rgba(196, 69, 105, 0.8) 8px,
                    transparent 8px,
                    transparent 16px
                );
            }
            
            .step-circle {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            
            .lock-overlay {
                width: 22px;
                height: 22px;
                font-size: 12px;
                bottom: -3px;
                right: -3px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .map-container {
                padding: 30px 20px;
            }
            
            .step-circle {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
            
            .actions-modal {
                width: 300px;
                padding: 18px;
            }
            
            .final-modal {
                width: 320px;
                padding: 20px;
            }
            
            .message-popup {
                font-size: 11px;
                padding: 5px 12px;
                white-space: normal;
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="falling-container" id="fallingContainer"></div>
    
    <button class="back-button" onclick="goBack()">← Вернуться</button>
    
    <div class="container">
        <h1>Карта сокровищ</h1>
        <div class="subtitle">✨ Выполняй шаг за шагом ✨</div>
        
        <div class="map-container">
            <div class="vertical-map" id="verticalMap"></div>
            <div class="horizontal-map" id="horizontalMap"></div>
        </div>
        
        <div class="progress-section">
            <div class="progress-label">🏆 Прогресс выполнения 🏆</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        let finalModalShown = false;
        let currentOverlay = null;
        let currentModal = null;

        const steps = [
            { id: 1, name: "Шаг 1" },
            { id: 2, name: "Шаг 2" },
            { id: 3, name: "Шаг 3" },
            { id: 4, name: "Шаг 4" },
            { id: 5, name: "Шаг 5" },
            { id: 6, name: "ФИНАЛ! 🏆" }
        ];

        const stepsData = {
            1: {
                title: "❤️ Первый этап",
                actions: [
                    "Поцелуй Мишу",
                    "Скажи как сильно ты его любишь",
                    "Подойди к тому месту, с которого начинается твое утро (ну допустим кровать)"
                ]
            },
            2: {
                title: "❤️ Второй этап",
                actions: [
                    "Сходи в ванную, не забудь умыться",
                    "Ещё раз поцелуй Мишу)))",
                    "Может заглянешь в стиральную машину?"
                ]
            },
            3: {
                title: "❤️ Третий этап",
                actions: [
                    "Сходи на кухню и скушай что-нибудь вкусненькое",
                    "Накорми пёсиков блин",
                    "Загляни под стол"
                ]
            },
            4: {
                title: "❤️ Четвертый этап",
                actions: [
                    "В сухомятку не кушай, попей водички",
                    "Отдохни немножко"
                ]
            },
            5: {
                title: "❤️ Пятый этап",
                actions: [
                    "Может пару слов туда сюда про небольшой квест?",
                    "А про Ваню, который старался, делая данный прикольчик?",
                    "Мишу не забываем поцеловать!!!"
                ]
            },
            6: {
                title: "🏆 ФИНАЛ! 🏆",
                actions: [
                    "А теперь загляни под кровать..."
                ]
            }
        };

        const finalCongratulations = {
            title: "🎉 ТЫ НАШЛА КЛАД! 🎉",
            message: "Дорогая, ты прошла весь этот путь и заслужила самый главный приз!\n\n" +
                    "Твоя улыбка - лучшее украшения дня.\n\n" +
                    "Ты сильнее, чем кажешься, и добрее, чем думаешь. И это прекрасно 💖\n\n" +
                    "Спасибо, что ты есть!🤗",
            emoji: "💝"
        };

        let completedActions = JSON.parse(localStorage.getItem('mapCompletedActions') || '{}');

        function closeAllModals() {
            if (currentOverlay) {
                currentOverlay.remove();
                currentOverlay = null;
            }
            if (currentModal) {
                currentModal.remove();
                currentModal = null;
            }
        }

        function isStepCompleted(stepId) {
            const actions = stepsData[stepId].actions;
            for (let i = 0; i < actions.length; i++) {
                const actionKey = `${stepId}_${i}`;
                if (!completedActions[actionKey]) {
                    return false;
                }
            }
            return true;
        }

        function isStepUnlocked(stepId) {
            if (stepId === 1) return true;
            return isStepCompleted(stepId - 1);
        }

        function getStepStatus(stepId) {
            const completed = isStepCompleted(stepId);
            const unlocked = isStepUnlocked(stepId);
            
            if (completed) return 'completed';
            if (!unlocked) return 'locked';
            return 'available';
        }

        function showFinalCongratulations() {
            if (finalModalShown) return;
            finalModalShown = true;

            closeAllModals();

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            document.body.appendChild(overlay);
            currentOverlay = overlay;

            const modal = document.createElement('div');
            modal.className = 'final-modal';
            modal.innerHTML = `
                <button class="close-modal" onclick="closeFinalModal()">×</button>
                <div style="font-size: 60px; margin-bottom: 15px;">${finalCongratulations.emoji}</div>
                <div style="font-size: 20px; font-weight: bold; color: #c44569; margin-bottom: 15px;">${finalCongratulations.title}</div>
                <p style="font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.6; white-space: pre-line;">
                    ${finalCongratulations.message}
                </p>
                <div style="font-size: 40px; margin: 15px 0;">🎁💝🎉</div>
                <button onclick="closeFinalModal()" style="background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%); color: white; border: none; padding: 10px 25px; border-radius: 25px; font-size: 14px; cursor: pointer; margin-top: 5px;">
                    💖 Закрыть 💖
                </button>
            `;
            document.body.appendChild(modal);
            currentModal = modal;
            
            for (let i = 0; i < 150; i++) {
                setTimeout(() => createConfetti(3), i * 15);
            }
        }

        function closeFinalModal() {
            closeAllModals();
        }

        function renderMap() {
            const verticalContainer = document.getElementById('verticalMap');
            const horizontalContainer = document.getElementById('horizontalMap');
            
            if (!verticalContainer || !horizontalContainer) return;
            
            verticalContainer.innerHTML = '';
            horizontalContainer.innerHTML = '';
            
            steps.forEach((step, index) => {
                const status = getStepStatus(step.id);
                const isCompleted = status === 'completed';
                const isLocked = status === 'locked';
                
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step-item';
                
                const circle = document.createElement('div');
                circle.className = `step-circle ${isLocked ? 'locked' : ''} ${isCompleted ? 'completed' : ''}`;
                circle.innerHTML = isCompleted ? '✓' : step.id;
                if (!isLocked) {
                    circle.onclick = () => showStepActions(step.id);
                } else {
                    circle.onclick = () => showMessageAtPosition('🔒 Сначала выполни предыдущий шаг!', window.innerWidth / 2, window.innerHeight / 2);
                }
                
                if (isLocked) {
                    const lockSpan = document.createElement('span');
                    lockSpan.className = 'lock-overlay';
                    lockSpan.textContent = '🔒';
                    circle.appendChild(lockSpan);
                }
                
                const nameSpan = document.createElement('div');
                nameSpan.className = 'step-name';
                nameSpan.textContent = step.name;
                
                stepDiv.appendChild(circle);
                stepDiv.appendChild(nameSpan);
                verticalContainer.appendChild(stepDiv);
                
                if (index < steps.length - 1) {
                    const line = document.createElement('div');
                    line.className = `dotted-line ${!isLocked ? 'active' : ''}`;
                    verticalContainer.appendChild(line);
                }
                
                const stepDivH = document.createElement('div');
                stepDivH.className = 'step-item-horizontal';
                
                const circleH = document.createElement('div');
                circleH.className = `step-circle ${isLocked ? 'locked' : ''} ${isCompleted ? 'completed' : ''}`;
                circleH.innerHTML = isCompleted ? '✓' : step.id;
                if (!isLocked) {
                    circleH.onclick = () => showStepActions(step.id);
                } else {
                    circleH.onclick = () => showMessageAtPosition('🔒 Сначала выполни предыдущий шаг!', window.innerWidth / 2, window.innerHeight / 2);
                }
                
                if (isLocked) {
                    const lockSpan = document.createElement('span');
                    lockSpan.className = 'lock-overlay';
                    lockSpan.textContent = '🔒';
                    circleH.appendChild(lockSpan);
                }
                
                const nameSpanH = document.createElement('div');
                nameSpanH.className = 'step-name';
                nameSpanH.textContent = step.name;
                
                stepDivH.appendChild(circleH);
                stepDivH.appendChild(nameSpanH);
                horizontalContainer.appendChild(stepDivH);
                
                if (index < steps.length - 1) {
                    const lineH = document.createElement('div');
                    lineH.className = `dotted-line-horizontal ${!isLocked ? 'active' : ''}`;
                    horizontalContainer.appendChild(lineH);
                }
            });
        }

        function showStepActions(stepId) {
            const step = stepsData[stepId];
            if (!step) return;

            closeAllModals();

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            document.body.appendChild(overlay);
            currentOverlay = overlay;

            const modal = document.createElement('div');
            modal.className = 'actions-modal';
            
            const actionsList = step.actions.map((action, index) => {
                const actionKey = `${stepId}_${index}`;
                const isCompleted = completedActions[actionKey] || false;
                return `
                    <div class="action-item" style="animation-delay: ${index * 0.05}s">
                        <input type="checkbox" class="action-checkbox" data-step="${stepId}" data-index="${index}" ${isCompleted ? 'checked' : ''}>
                        <span class="action-text ${isCompleted ? 'completed' : ''}">${action}</span>
                    </div>
                `;
            }).join('');

            modal.innerHTML = `
                <div class="actions-header">
                    <div class="actions-title">${step.title}</div>
                    <button class="close-modal" onclick="closeAllModals()">×</button>
                </div>
                <div class="actions-list">
                    ${actionsList}
                </div>
                <div style="margin-top: 12px; text-align: center; font-size: 11px; color: #999;">
                    ✨ Отметь все пункты, чтобы завершить шаг ✨
                </div>
            `;
            
            document.body.appendChild(modal);
            currentModal = modal;
            
            modal.querySelectorAll('.action-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const step = parseInt(checkbox.dataset.step);
                    const index = parseInt(checkbox.dataset.index);
                    const actionKey = `${step}_${index}`;
                    const actionText = checkbox.parentElement.querySelector('.action-text');
                    
                    if (checkbox.checked) {
                        completedActions[actionKey] = true;
                        actionText.classList.add('completed');
                        createConfetti(15);
                        showMessageAtPosition('✅ Выполнено!', checkbox.getBoundingClientRect().left + 30, checkbox.getBoundingClientRect().top);
                    } else {
                        completedActions[actionKey] = false;
                        actionText.classList.remove('completed');
                    }
                    
                    localStorage.setItem('mapCompletedActions', JSON.stringify(completedActions));
                    
                    const allCompleted = stepsData[step].actions.every((_, idx) => {
                        return completedActions[`${step}_${idx}`];
                    });
                    
                    if (allCompleted) {
                        // Убрали уведомление о завершении шага
                        closeAllModals();
                        
                        if (step === 6) {
                            setTimeout(() => {
                                showFinalCongratulations();
                            }, 500);
                        }
                    }
                    
                    updateProgress();
                    renderMap();
                });
            });
        }

        function updateProgress() {
            let totalActions = 0;
            let completedCount = 0;
            
            for (let stepId in stepsData) {
                totalActions += stepsData[stepId].actions.length;
                for (let i = 0; i < stepsData[stepId].actions.length; i++) {
                    const actionKey = `${stepId}_${i}`;
                    if (completedActions[actionKey]) {
                        completedCount++;
                    }
                }
            }
            
            const progress = (completedCount / totalActions) * 100;
            const progressFill = document.getElementById('progressFill');
            if (progressFill) {
                progressFill.style.width = progress + '%';
            }
        }

        const emojis = ['❤️', '🌸', '⭐', '🎈', '🎂', '💝', '🌺', '✨', '🎉', '🦋', '🌷', '🌟', '💕', '🎊'];
        
        function createFallingEmoji() {
            const emoji = document.createElement('div');
            emoji.classList.add('falling-emoji');
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.textContent = randomEmoji;
            
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 6 + 5;
            const size = Math.random() * 25 + 25;
            const rotation = Math.random() * 360;
            
            emoji.style.left = startX + 'px';
            emoji.style.fontSize = size + 'px';
            emoji.style.animationDuration = duration + 's';
            emoji.style.transform = `rotate(${rotation}deg)`;
            
            emoji.addEventListener('click', async (e) => {
                e.stopPropagation();
                const rect = emoji.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const response = await fetch(`/api/message?emoji=${encodeURIComponent(randomEmoji)}`);
                const data = await response.json();
                showMessageAtPosition(data.message, centerX, centerY);
                
                emoji.remove();
            });
            
            document.getElementById('fallingContainer').appendChild(emoji);
            
            setTimeout(() => {
                if (emoji.parentNode) emoji.remove();
            }, duration * 1000);
        }
        
        function showMessageAtPosition(text, x, y) {
            const message = document.createElement('div');
            message.classList.add('message-popup');
            message.textContent = text;
            
            message.style.left = (x - 70) + 'px';
            message.style.top = (y - 35) + 'px';
            
            setTimeout(() => {
                const messageRect = message.getBoundingClientRect();
                if (messageRect.left < 0) message.style.left = '10px';
                if (messageRect.right > window.innerWidth) {
                    message.style.left = (window.innerWidth - messageRect.width - 10) + 'px';
                }
                if (messageRect.top < 0) message.style.top = (y + 20) + 'px';
                if (messageRect.bottom > window.innerHeight) message.style.top = (y - 50) + 'px';
            }, 0);
            
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.style.animation = 'popupIn 0.2s ease-out reverse';
                setTimeout(() => message.remove(), 200);
            }, 1800);
        }

        function createConfetti(count = 30) {
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
                confetti.style.zIndex = '10000';
                confetti.style.pointerEvents = 'none';
                confetti.style.borderRadius = '50%';
                confetti.style.animation = `fallConfetti ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function goBack() {
            closeAllModals();
            window.location.href = '/';
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fallConfetti {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        setInterval(createFallingEmoji, 500);
        for (let i = 0; i < 10; i++) {
            setTimeout(createFallingEmoji, i * 150);
        }
        
        renderMap();
        updateProgress();
    </script>
</body>
</html>
